# docker compose exec model_predictive_control bash
# docker compose run --rm model_predictive_control bash

x-common-service: &common-service
  privileged: true
  environment:
    - DISPLAY=${DISPLAY}
    - QT_X11_NO_MITSHM=1
    - XAUTHORITY=/tmp/.docker.xauth
    - XDG_RUNTIME_DIR=/run/user/1000
  network_mode: host
  tty: true
  stdin_open: true
  working_dir: /home/ubuntu
  command: /bin/bash
  restart: unless-stopped

x-common-build: &common-build
  args:
    UID: ${UID:-1000}
    GID: ${GID:-1000}

x-common-volumes: &common-volumes
  - "/etc/localtime:/etc/localtime:ro"
  - "/tmp/.X11-unix:/tmp/.X11-unix:rw"
  - "/tmp/.docker.xauth:/tmp/.docker.xauth"


services:
  model_predictive_control:
    <<: *common-service
    build:
      context: docker
      dockerfile: Dockerfile
      <<: *common-build
    image: model_predictive_control-image
    container_name: model_predictive_control-container
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "/tmp/.X11-unix:/tmp/.X11-unix:rw"
      - "/tmp/.docker.xauth:/tmp/.docker.xauth"
      - "${PWD}/model_predictive_control:/home/ubuntu/model_predictive_control:rw"
